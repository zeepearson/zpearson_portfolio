<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zee Pearson Portfolio</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.12), transparent 30%),
        var(--bg);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    main {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      max-width: 620px;
      width: min(90vw, 640px);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 2vw + 1.5rem, 3rem);
      letter-spacing: -0.04em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 48ch;
      margin: 0 auto 1.25rem auto;
      line-height: 1.6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.35);
      color: var(--text);
      background: linear-gradient(120deg, rgba(56, 189, 248, 0.12), rgba(56, 189, 248, 0.06));
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-top: 0.25rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(56, 189, 248, 0.18), 0 0 16px rgba(56, 189, 248, 0.5);
    }
  </style>
</head>
<body>
  <main>
    <div class="pill">
      <span class="dot" aria-hidden="true"></span>
      Hello world, from Zee Pearson
    </div>
    <h1>Hello World</h1>
    <p>
      A minimal starting point for Zee Pearson's portfolio. Replace this greeting with your story, showcase, and links when
      you're ready to publish.
    </p>
  </main>
</body>
</html>
